## facefusion.ini - cocoro-face configuration
## FaceFusion 3.6.0

[facefusion]

# Face Swapper
face_swapper_model = inswapper_128_fp16
face_swapper_pixel_boost = 1024x1024

# Face Enhancer
face_enhancer_model = gfpgan_1.4
face_enhancer_blend = 80

# Processors
processors = face_swapper face_enhancer expression_restorer

# Execution
execution_providers = cuda
execution_thread_count = 64
execution_queue_count = 1

# Face Detector
face_detector_model = yolo_face
face_detector_size = 640x640
face_detector_score = 0.5
face_detector_angles = 0 90 180 270

# Face Selector
face_selector_mode = many
face_selector_order = best-worst

# Face Mask
face_mask_types = box occlusion
face_mask_blur = 0.3
face_mask_padding = 0 0 0 0

# Output
output_image_quality = 95
output_image_resolution = 1024x1024
output_video_fps = 30
output_video_quality = 90

# Download
download_providers = github huggingface

# Skip (no GUI needed)
skip_download = false
headless = true
